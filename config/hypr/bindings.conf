# Programs
$launcher = launch-walker

# Launcher
bindd = SUPER, Space, Launcher, exec, $launcher
bindd = SUPER ALT, Space, Menu, exec, launch-menu
bindd = SUPER CTRL, SPACE, Backgrounds, exec, launch-bg-picker
bindd = SUPER, Escape, Power menu, exec, launch-power-menu
bindd = SUPER CTRL, L, Lock screen, exec, lock-screen

# Apps
bindd = SUPER, Q, Close window, killactive
bindd = SUPER, T, Terminal, exec, launch-terminal
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"
bindd = SUPER, Y, Yazi File manager, exec, launch-yazi
bindd = SUPER, E, File manager, exec, uwsm app -- nautilus
bindd = SUPER, B, Browser, exec, launch-browser
bindd = SUPER, N, Editor, exec, launch-editor
bindd = SUPER CTRL, C, VS Code, exec, uwsm app -- code

# Web Apps
bindd = SUPER SHIFT, Y, YouTube, exec, launch-webapp https://youtube.com
bindd = SUPER SHIFT, A, AI Picker, exec, ai-picker

# Focus
bindd = SUPER, H, Focus left, movefocus, l
bindd = SUPER, J, Focus down, movefocus, d
bindd = SUPER, K, Focus up, movefocus, u
bindd = SUPER, L, Focus right, movefocus, r

# Window actions
bindd = SUPER SHIFT, H, Swap left, swapwindow, l
bindd = SUPER SHIFT, L, Swap right, swapwindow, r
bindd = SUPER SHIFT, K, Swap up, swapwindow, u
bindd = SUPER SHIFT, J, Swap down, swapwindow, d
bindd = SUPER SHIFT, T, Toggle floating, togglefloating
bindd = SUPER SHIFT, J, Toggle split, togglesplit

# Workspaces
bindd = SUPER, 1, Workspace 1, workspace, 1
bindd = SUPER, 2, Workspace 2, workspace, 2
bindd = SUPER, 3, Workspace 3, workspace, 3
bindd = SUPER, 4, Workspace 4, workspace, 4
bindd = SUPER, 5, Workspace 5, workspace, 5
bindd = SUPER, 6, Workspace 6, workspace, 6
bindd = SUPER, 7, Workspace 7, workspace, 7
bindd = SUPER, 8, Workspace 8, workspace, 8
bindd = SUPER, 9, Workspace 9, workspace, 9
bindd = SUPER, 0, Workspace 10, workspace, 10

bindd = SUPER SHIFT, 1, Move to 1, movetoworkspace, 1
bindd = SUPER SHIFT, 2, Move to 2, movetoworkspace, 2
bindd = SUPER SHIFT, 3, Move to 3, movetoworkspace, 3
bindd = SUPER SHIFT, 4, Move to 4, movetoworkspace, 4
bindd = SUPER SHIFT, 5, Move to 5, movetoworkspace, 5
bindd = SUPER SHIFT, 6, Move to 6, movetoworkspace, 6
bindd = SUPER SHIFT, 7, Move to 7, movetoworkspace, 7
bindd = SUPER SHIFT, 8, Move to 8, movetoworkspace, 8
bindd = SUPER SHIFT, 9, Move to 9, movetoworkspace, 9
bindd = SUPER SHIFT, 0, Move to 10, movetoworkspace, 10

# Resize
bindd = SUPER, R, Resize mode, submap, resize
submap = resize
bindd = , L, Resize right, resizeactive, 15 0
bindd = , H, Resize left, resizeactive, -15 0
bindd = , K, Resize up, resizeactive, 0 -15
bindd = , J, Resize down, resizeactive, 0 15
bindd = , escape, Exit resize, submap, reset
submap = reset

# Media keys
bindl = ,XF86AudioRaiseVolume, exec, volume-display +5%
bindl = ,XF86AudioLowerVolume, exec, volume-display -5%
bindl = ,XF86AudioMute, exec, volume-display toggle
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPrev, exec, playerctl previous

# Brightness
bindl = ,XF86MonBrightnessUp, exec, brightness-display +5%
bindl = ,XF86MonBrightnessDown, exec, brightness-display -5%

# System monitors
bindd = CTRL ALT, Delete, Activity monitor, exec, launch-or-focus-tui btop

# System
bindd = SUPER CTRL, W, Restart waybar, exec, restart-waybar

# Screenshot
bindd = , PRINT, Screenshot, exec, screenshot
bindd = SHIFT, PRINT, Screenshot fullscreen, exec, screenshot fullscreen
bindd = SUPER ALT, comma, Edit last screenshot, exec, screenshot-edit

# Notifications
bindd = SUPER, comma, Dismiss last notification, exec, makoctl dismiss
bindd = SUPER SHIFT, comma, Dismiss all notifications, exec, makoctl dismiss --all
bindd = SUPER CTRL ALT, T, Show time, exec, notify-send -u low "    $(date +"%A %H:%M  ·  %d %B %Y  ·  Week %V")"
bindd = SUPER CTRL ALT, B, Show battery, exec, notify-send -u low "$(battery-status)"

# Mouse
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
