# Media keys for volume and brightness (with SwayOSD OSD)
bindeld = , XF86AudioRaiseVolume, Volume up, exec, cmd-swayosd --output-volume raise
bindeld = , XF86AudioLowerVolume, Volume down, exec, cmd-swayosd --output-volume lower
bindeld = , XF86AudioMute, Mute, exec, cmd-swayosd --output-volume mute-toggle

# Player controls (requires playerctl)
bindld = , XF86AudioPlay, Play/Pause, exec, playerctl play-pause
bindld = , XF86AudioNext, Next track, exec, playerctl next
bindld = , XF86AudioPrev, Previous track, exec, playerctl previous

# Display brightness (uses native SwayOSD)
bindeld = , XF86MonBrightnessUp, Brightness up, exec, cmd-swayosd --output-brightness raise
bindeld = , XF86MonBrightnessDown, Brightness down, exec, cmd-swayosd --output-brightness lower

# Precise 1% adjustments with Alt modifier
bindeld = ALT, XF86AudioRaiseVolume, Volume up precise, exec, cmd-swayosd --output-volume +1
bindeld = ALT, XF86AudioLowerVolume, Volume down precise, exec, cmd-swayosd --output-volume -1
bindeld = ALT, XF86MonBrightnessUp, Brightness up precise, exec, cmd-swayosd --output-brightness +1
bindeld = ALT, XF86MonBrightnessDown, Brightness down precise, exec, cmd-swayosd --output-brightness -1