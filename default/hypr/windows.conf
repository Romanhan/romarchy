# Window rules

# Tag all windows for default opacity (apps can override with no-default-opacity tag)
windowrule = tag +default-opacity, match:class .*

# Apply default opacity after apps have had a chance to opt out
windowrule = opacity 0.97 0.9, match:tag default-opacity

# Disable opacity exceptions
windowrule = opacity 1 override 1 override, match:class (virt-manager)
windowrule = opacity 1 override 1 override, match:class (brave-browser)
windowrule = opacity 1 override 1 override, match:class (brave-.*__-Default)

# Steam
windowrule = opacity 1 override 1 override, match:class (steam)
windowrule = tile on, match:class (steam)
windowrule = center on, match:class (steam), match:title (Steam)
windowrule = size 1920 1080, match:class (steam), match:title (Steam)
windowrule = size 460 800, match:class (steam), match:title (Friends List)


windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# Fix XWayland drag issues - empty class/title XWayland floating windows shouldn't be focused
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = 1
    match:float = 1
    match:fullscreen = 0
    match:pin = 0
    no_focus = on
}

# Floating windows
windowrule = float on, match:tag floating-window
windowrule = center on, match:tag floating-window
windowrule = size 1000 700, match:tag floating-window
windowrule = tag +floating-window, match:class (org.romarchy.terminal|...|org.gnome.Evince)
